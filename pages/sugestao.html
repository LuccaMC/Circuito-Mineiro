<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Sugestão da cidade</title>
    <link rel="stylesheet" href="../css/style_sugestao.css">
    <link rel="icon" type="image/png" href="../image/logo_site.png">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
</head>

<body>

    <header>

        <img class="logo" src="../image/logo_site.png" alt="logo do site">

        <div class="menu-toggle" id="menu-toggle">
            ☰
        </div>

        <div class="links" id="links">
            <a href="../index.html">Início</a>
            <a href="#finalpag">Deixe sua Sugestão</a>
            <a href="../pages/sobre_nos.html">Sobre Nós</a>
            <a href="../pages/consultoria.html">Consultoria</a>
        </div>

    </header>


    <h2>Deixe aqui a sugestão da cidade que você quer conhecer</h2>

    <form method="get">
        <label for="nome">Informe seu nome:</label><br>
        <input type="text" name="nome" placeholder="Informar nome"><br><br>

        <label for="nome">Informe seu Email:</label><br>
        <input type="text" name="email" placeholder="Informar email"><br><br>

        <label for="nome">Informe seu telefone para contato:</label><br>
        <input type="text" id="telefone" name="telefone" placeholder="(00)0 0000-0000"><br><br>

        <label for="nome">Informe a cidade que você deseja ver no site:</label><br>
        <input type="text" name="sugestao" placeholder="Sugestão de cidade"><br><br>

        <button type="submit">Enviar sugestão</button>
        <button type="reset">Limpar formulário</button>
    </form>

    <footer class="rodape">
        <h3 class="color">Sugira uma Cidade</h3>
        <p class="cor">Ajude-nos a expandir nosso guia turísticos de Minas Gerais!</p>
    </footer>

    <div class="footerfixo">
        <br><br>
        <p class="cor">Projeto acadêmico de Desenvolvimento Web — Circuito Mineiro © 2026</p>
    </div>

</body>

<script>

    //máscara

    $(document).ready(function () {

        $('#telefone').mask('(00) 00000-0000');

        //método hamburger para celulares

        const menuToggle = document.getElementById("menu-toggle");

        const links = document.getElementById("links");

        menuToggle.addEventListener("click", function () {

            links.classList.toggle("active");

        });

    });

</script>

</html>
